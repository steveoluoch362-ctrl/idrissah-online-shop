<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Customer Login | Idrissah Online Shop
    </title>

    <style>

        body {

            margin: 0;

            font-family: Arial, sans-serif;

            background: #f5f5f5;

            display: flex;

            align-items: center;

            justify-content: center;

            min-height: 100vh;

        }


        .login-box {

            background: white;

            width: 90%;

            max-width: 420px;

            padding: 35px;

            border-radius: 12px;

            box-shadow:
                0 5px 25px
                rgba(0,0,0,0.1);

        }


        .logo {

            text-align: center;

            margin-bottom: 20px;

        }


        .logo img {

            width: 100px;

        }


        h1 {

            text-align: center;

            color: #ff6600;

        }


        input {

            width: 100%;

            padding: 14px;

            margin: 10px 0;

            border: 1px solid #ddd;

            border-radius: 6px;

            box-sizing: border-box;

        }


        button {

            width: 100%;

            padding: 14px;

            background: #ff6600;

            color: white;

            border: none;

            border-radius: 6px;

            font-weight: bold;

            cursor: pointer;

        }


        button:hover {

            background: #e85b00;

        }


        .register {

            text-align: center;

            margin-top: 20px;

        }


        a {

            color: #ff6600;

            font-weight: bold;

            text-decoration: none;

        }


        .message {

            background: #ffe5d0;

            padding: 10px;

            margin-bottom: 15px;

            border-radius: 5px;

        }

    </style>

</head>


<body>


<div class="login-box">


    <div class="logo">

        <img
            src="/static/shop/images/logo.png"
            alt="Idrissah Online Shop"
        >

    </div>


    <h1>

        Customer Login

    </h1>


    {% if messages %}

        {% for message in messages %}

            <div class="message">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}


    <form method="POST">

        {% csrf_token %}


        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >


        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >


        <button type="submit">

            Login

        </button>

    </form>


    <div class="register">

        Don't have an account?


        <br><br>


        <a href="{% url 'customer_register' %}">

            Create Customer Account

        </a>

    </div>


</div>


</body>

</html>
